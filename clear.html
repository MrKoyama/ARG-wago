<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONGRATULATIONS! - 調査完了</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .clear-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 150, 136, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #009688;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 0.1rem;
        }

        .badge {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        p {
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .highlight {
            color: #00796b;
            font-weight: 700;
        }

        .back-home {
            display: inline-block;
            padding: 15px 40px;
            background-color: #009688;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 144, 131, 0.3);
        }

        .back-home:hover {
            background-color: #00796b;
            transform: scale(1.05);
        }

        .decoration {
            position: absolute;
            z-index: -1;
            border-radius: 50%;
            background: rgba(0, 150, 136, 0.05);
        }
    </style>
</head>
<body>

    <div class="decoration" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="decoration" style="width: 200px; height: 200px; bottom: -50px; right: -50px;"></div>

    <div class="clear-card">
        <div class="badge">🎉</div>
        <h1>ARG CLEAR!</h1>
        <p>
            お疲れ様でした！<br>
            「和護の杜」に隠されたすべての真実を解き明かし、<br>
            無事に調査を完了しました。
        </p>
        <p>
            東條宗一の計画を最後まで見届けたあなたに、<br>
            最大限の敬意を表します。<br>
            <span class="highlight">プレイしていただき、ありがとうございました！</span>
        </p>
        
        <a href="toppage.html" class="back-home">最初のページに戻る</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // ページ読み込み時に紙吹雪を飛ばす
        window.onload = function() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#009688', '#80cbc4', '#ffffff']
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#009688', '#80cbc4', '#ffffff']
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        };
    </script>
</body>
</html>
