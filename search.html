        showNoResults();
    } else {
        // --- 修正ポイント：完全一致、ただし「研究資料」のみ特例で一致させる ---
        const filtered = secretPages.filter(p => 
            p.keywords.some(k => k === query)
        );

        if (filtered.length > 0) {
            // 背景変化のトリガー。機密ワードが含まれていれば発動
            const triggerKeywords = ["千五百秋式因果固定礎", "高次エネルギー体", "磐長姫", "高千穂計画", "神格顕現技術", "神聖理化学研究所", "神の恩寵", "天照大神", "東條宗一", "橋本賢治","長谷川忠敬","加納慎一郎", "波形強制同期理論", "長谷川忠敬", "精神抑留事案", "有機物定常凍結理論", "広域意思疎通実験", "研究資料", "【研究資料】", "経常桜", "聴神経変調技術", "分子配列固定技術", "純正律動音源", "和音原盤", "和護真経"];

                body.classList.add('system-override');
            }
            displayResults(filtered);
        } else {
            showNoResults();
        }
    }

    function displayResults(dataList) {
        dataList.forEach(p => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <a href="${p.url}" class="result-title">${p.title}</a>
                <span class="result-text">${p.firstText}</span>
            `;
            resultsArea.appendChild(div);
        });
    }

    function showNoResults() {
        resultsArea.innerHTML = `
            <div class="no-results">
                <p>お探しのページは見つかりませんでした。</p>
                <p>入力したキーワードに誤りがないかご確認ください。</p>

        `;
    }

    function executeSearch() {
        const val = document.getElementById('site-search').value;
        if(val) window.location.href = `search.html?q=${encodeURIComponent(val)}`;
    }

    document.getElementById('site-search').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') executeSearch();
    });
